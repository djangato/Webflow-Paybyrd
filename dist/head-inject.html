/* Responsive                                 */

@media (max-width: 900px) {
  .pbrd-pos-grid {
    grid-template-columns: 1fr;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
  }
  .pbrd-terminal-img-wrap { height: 240px; }
}

@media (max-width: 768px) {
  .pbrd-pricing-section,
  .pbrd-pos-section { padding: 64px 16px 48px; }
  .pbrd-pricing-header,
  .pbrd-pos-header { margin-bottom: 40px; }
  .pbrd-category-filters { gap: 6px; margin-bottom: 32px; }
  .pbrd-filter-btn { padding: 8px 16px; font-size: 0.8125rem; }
  .pbrd-method-row { grid-template-columns: 1fr auto; padding: 14px 16px; gap: 8px; }
  .pbrd-method-region { display: none; }
  .pbrd-table-header { grid-template-columns: 1fr auto; padding: 12px 16px; }
  .pbrd-table-header span:nth-child(2) { display: none; }
  .pbrd-category-header { padding: 16px; }
  .pbrd-method-icon { width: 36px; height: 24px; }
  .pbrd-method-name { font-size: 0.875rem; }
  .pbrd-method-fee { font-size: 0.875rem; }
  .pbrd-toggle-btn { padding: 8px 20px; font-size: 0.875rem; }
  .pbrd-terminal-body { padding: 20px 20px 28px; }
}

@media (max-width: 480px) {
  .pbrd-pricing-header h2,
  .pbrd-pos-header h2 { font-size: 1.75rem; }
  .pbrd-filter-btn { padding: 7px 14px; font-size: 0.75rem; }
  .pbrd-method-info { gap: 10px; }
  .pbrd-toggle-btn { padding: 8px 16px; font-size: 0.8125rem; }
  .pbrd-toggle-badge { display: none; }
}
